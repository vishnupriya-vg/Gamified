<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Quiz – India Edition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 640px;
    }
    .screen.active { display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Start screen ── */
    .start-card {
      background: #1e293b;
      border-radius: 1.25rem;
      padding: 3rem 2rem;
      text-align: center;
      box-shadow: 0 20px 60px #0008;
    }
    .start-card .flag { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .start-card h1 { font-size: 2rem; font-weight: 800; color: #f97316; margin-bottom: 0.5rem; }
    .start-card p { color: #94a3b8; font-size: 1rem; margin-bottom: 2rem; }

    /* ── Game screen ── */
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      border-radius: 0.75rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .meta-bar strong { color: #f1f5f9; }
    .round-badge {
      background: #f97316;
      color: #fff;
      font-weight: 700;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
    }

    .clue-card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 1.75rem;
      box-shadow: 0 8px 32px #0006;
    }
    .clue-card .label {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.75rem;
    }
    .clue-card .question {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e2e8f0;
    }
    .specs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-top: 1.1rem;
    }
    .spec-pill {
      background: #0f172a;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .spec-pill span { color: #f1f5f9; font-weight: 600; display: block; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .option-btn {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 0.75rem;
      padding: 1rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: center;
      line-height: 1.3;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #f97316;
      background: #1e293b;
      transform: translateY(-2px);
    }
    .option-btn.correct {
      border-color: #22c55e;
      background: #14532d55;
      color: #86efac;
    }
    .option-btn.wrong {
      border-color: #ef4444;
      background: #7f1d1d44;
      color: #fca5a5;
    }
    .option-btn:disabled { cursor: default; transform: none; }

    .feedback-bar {
      border-radius: 0.75rem;
      padding: 0.9rem 1.25rem;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
    }
    .feedback-bar.show { display: block; }
    .feedback-bar.correct { background: #14532d88; color: #86efac; border: 1px solid #22c55e44; }
    .feedback-bar.wrong   { background: #7f1d1d66; color: #fca5a5; border: 1px solid #ef444444; }

    /* ── Results screen ── */
    .results-card {
      background: #1e293b;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 20px 60px #0008;
    }
    .results-card .trophy { font-size: 3rem; margin-bottom: 0.5rem; }
    .results-card h2 { font-size: 1.75rem; font-weight: 800; color: #f97316; margin-bottom: 0.5rem; }
    .score-display {
      font-size: 3.5rem;
      font-weight: 900;
      margin: 1rem 0;
      color: #f1f5f9;
    }
    .score-display span { color: #64748b; font-size: 2rem; }
    .score-msg { color: #94a3b8; margin-bottom: 2rem; font-size: 1rem; }
    .review-list { text-align: left; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .review-item {
      background: #0f172a;
      border-radius: 0.6rem;
      padding: 0.7rem 1rem;
      font-size: 0.875rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }
    .review-item .ri { font-size: 1rem; flex-shrink: 0; margin-top: 0.1rem; }
    .review-item .car-name { font-weight: 700; color: #f1f5f9; }
    .review-item .detail { color: #64748b; font-size: 0.8rem; }

    /* ── Shared button ── */
    .btn-primary {
      background: #f97316;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 0.75rem;
      padding: 0.9rem 2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }
    .btn-primary:hover { background: #ea6f0f; transform: translateY(-1px); }

    /* progress dots */
    .progress-dots { display: flex; gap: 0.4rem; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #334155;
      transition: background 0.2s;
    }
    .dot.done { background: #f97316; }
    .dot.current { background: #fb923c; box-shadow: 0 0 6px #fb923c88; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="start-card">
    <div class="flag">🇮🇳</div>
    <h1>Car Quiz</h1>
    <p>Identify Indian market cars from clues & specs.<br>2 rounds · 3 choices each.</p>
    <button class="btn-primary" onclick="startGame()">Start Quiz</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="meta-bar">
    <div>Question <strong id="q-num">1</strong> of <strong id="q-total">2</strong></div>
    <div class="progress-dots" id="dots"></div>
    <div>Score <strong id="score-live">0</strong></div>
  </div>

  <div class="clue-card">
    <div class="label">Round <span id="round-label">1</span> · Guess the car</div>
    <div class="question" id="clue-text"></div>
    <div class="specs" id="specs-grid"></div>
  </div>

  <div class="options-grid" id="options-grid"></div>

  <div class="feedback-bar" id="feedback-bar"></div>

  <button class="btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">
    Next →
  </button>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div class="results-card">
    <div class="trophy" id="trophy-icon">🏆</div>
    <h2>Quiz Complete!</h2>
    <div class="score-display" id="final-score"></div>
    <p class="score-msg" id="score-msg"></p>
    <div class="review-list" id="review-list"></div>
    <button class="btn-primary" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
  // ── Car data: Indian market cars ──────────────────────────────────
  const ALL_CARS = [
    {
      id: 1,
      name: "Maruti Suzuki Swift",
      clue: "A hugely popular hatchback known for its peppy engine and nimble city handling.",
      specs: [
        { label: "Segment", value: "Hatchback" },
        { label: "Engine", value: "1.2L Petrol / CNG" },
        { label: "Power", value: "~90 bhp" },
        { label: "Rivals", value: "i20, Altroz" },
      ],
    },
    {
      id: 2,
      name: "Hyundai Creta",
      clue: "India's best-selling mid-size SUV with a bold design and feature-packed cabin.",
      specs: [
        { label: "Segment", value: "Compact SUV" },
        { label: "Engine", value: "1.5L Petrol/Diesel" },
        { label: "Power", value: "115–116 bhp" },
        { label: "Rivals", value: "Seltos, Nexon" },
      ],
    },
    {
      id: 3,
      name: "Tata Nexon",
      clue: "The first Indian car to receive a 5-star GNCAP rating; comes in petrol, diesel and EV forms.",
      specs: [
        { label: "Segment", value: "Compact SUV" },
        { label: "Engine", value: "1.2T Petrol / 1.5 Diesel" },
        { label: "Safety", value: "5-Star GNCAP" },
        { label: "Rivals", value: "Creta, Venue" },
      ],
    },
    {
      id: 4,
      name: "Mahindra Scorpio-N",
      clue: "A rugged body-on-frame SUV with true 4×4 capability, a crowd favourite since 2002.",
      specs: [
        { label: "Segment", value: "Full-size SUV" },
        { label: "Engine", value: "2.2L mHawk Diesel" },
        { label: "Drive", value: "4×4 available" },
        { label: "Rivals", value: "Fortuner, Hector" },
      ],
    },
    {
      id: 5,
      name: "Honda City",
      clue: "A premium C-segment sedan with a refined petrol engine and a spacious rear bench.",
      specs: [
        { label: "Segment", value: "Mid-size Sedan" },
        { label: "Engine", value: "1.5L i-VTEC Petrol" },
        { label: "Power", value: "121 bhp" },
        { label: "Rivals", value: "Verna, Ciaz" },
      ],
    },
    {
      id: 6,
      name: "Toyota Innova Crysta",
      clue: "The go-to 7-seat MPV for families and fleet operators, known for bulletproof reliability.",
      specs: [
        { label: "Segment", value: "MPV" },
        { label: "Engine", value: "2.7L Petrol / 2.4L Diesel" },
        { label: "Seating", value: "7–8 seats" },
        { label: "Rivals", value: "Ertiga, Hycross" },
      ],
    },
    {
      id: 7,
      name: "Kia Seltos",
      clue: "The car that put Kia on the Indian map — tech-loaded SUV with a striking design.",
      specs: [
        { label: "Segment", value: "Compact SUV" },
        { label: "Engine", value: "1.5L / 1.6T Petrol" },
        { label: "Feature", value: "Large panoramic sunroof" },
        { label: "Rivals", value: "Creta, Hector" },
      ],
    },
    {
      id: 8,
      name: "Maruti Suzuki Baleno",
      clue: "A premium hatchback with a wide cabin, mild-hybrid tech and Maruti's trusted service network.",
      specs: [
        { label: "Segment", value: "Premium Hatchback" },
        { label: "Engine", value: "1.2L DualJet + SHVS" },
        { label: "Feature", value: "HUD display" },
        { label: "Rivals", value: "i20, Altroz" },
      ],
    },
    {
      id: 9,
      name: "Tata Tiago",
      clue: "An award-winning entry-level hatchback praised for its safety and build quality.",
      specs: [
        { label: "Segment", value: "Entry Hatchback" },
        { label: "Engine", value: "1.2L Revotron Petrol" },
        { label: "Safety", value: "4-Star GNCAP" },
        { label: "Rivals", value: "Wagon R, Celerio" },
      ],
    },
    {
      id: 10,
      name: "MG Hector",
      clue: "A spacious internet-connected SUV that brought large touchscreens and ADAS to mainstream India.",
      specs: [
        { label: "Segment", value: "Mid-size SUV" },
        { label: "Engine", value: "1.5T Petrol / Diesel" },
        { label: "Feature", value: "14-inch infotainment" },
        { label: "Rivals", value: "Harrier, XUV700" },
      ],
    },
  ];

  // ── Game state ────────────────────────────────────────────────────
  const TOTAL_ROUNDS = 2;
  let questions = [];
  let current = 0;
  let score = 0;
  let answered = [];

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function buildQuestions() {
    const pool = shuffle(ALL_CARS).slice(0, TOTAL_ROUNDS);
    return pool.map((car) => {
      const distractors = shuffle(ALL_CARS.filter((c) => c.id !== car.id)).slice(0, 2);
      const options = shuffle([car, ...distractors]);
      return { car, options };
    });
  }

  // ── Screens ───────────────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Start ─────────────────────────────────────────────────────────
  function startGame() {
    questions = buildQuestions();
    current = 0;
    score = 0;
    answered = [];
    buildDots();
    renderQuestion();
    show('screen-game');
  }

  function buildDots() {
    const container = document.getElementById('dots');
    container.innerHTML = '';
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' current' : '');
      d.id = `dot-${i}`;
      container.appendChild(d);
    }
  }

  function updateDots() {
    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const d = document.getElementById(`dot-${i}`);
      d.className = 'dot' + (i < current ? ' done' : i === current ? ' current' : '');
    }
  }

  // ── Render question ───────────────────────────────────────────────
  function renderQuestion() {
    const { car, options } = questions[current];

    document.getElementById('q-num').textContent = current + 1;
    document.getElementById('q-total').textContent = TOTAL_ROUNDS;
    document.getElementById('round-label').textContent = current + 1;
    document.getElementById('score-live').textContent = score;
    document.getElementById('clue-text').textContent = car.clue;

    // specs
    const specsEl = document.getElementById('specs-grid');
    specsEl.innerHTML = car.specs
      .map((s) => `<div class="spec-pill">${s.label}<span>${s.value}</span></div>`)
      .join('');

    // options
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    options.forEach((opt) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt.name;
      btn.onclick = () => selectAnswer(opt.id, car.id);
      grid.appendChild(btn);
    });

    // reset feedback
    const fb = document.getElementById('feedback-bar');
    fb.className = 'feedback-bar';
    fb.textContent = '';
    document.getElementById('next-btn').style.display = 'none';

    updateDots();
  }

  // ── Answer selection ──────────────────────────────────────────────
  function selectAnswer(selectedId, correctId) {
    const isCorrect = selectedId === correctId;
    if (isCorrect) score++;

    answered.push({ question: questions[current], correct: isCorrect, selectedId });

    // highlight buttons
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((btn) => {
      btn.disabled = true;
      const optName = btn.textContent;
      const optCar = questions[current].options.find((o) => o.name === optName);
      if (optCar.id === correctId) btn.classList.add('correct');
      else if (optCar.id === selectedId) btn.classList.add('wrong');
    });

    // feedback
    const fb = document.getElementById('feedback-bar');
    if (isCorrect) {
      fb.textContent = '✓ Correct! Well done.';
      fb.className = 'feedback-bar correct show';
    } else {
      const correctName = questions[current].car.name;
      fb.textContent = `✗ Not quite — it was the ${correctName}.`;
      fb.className = 'feedback-bar wrong show';
    }

    document.getElementById('score-live').textContent = score;

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = current < TOTAL_ROUNDS - 1 ? 'Next →' : 'See Results';
  }

  // ── Next ──────────────────────────────────────────────────────────
  function nextQuestion() {
    current++;
    if (current < TOTAL_ROUNDS) {
      renderQuestion();
    } else {
      showResults();
    }
  }

  // ── Results ───────────────────────────────────────────────────────
  function showResults() {
    document.getElementById('final-score').innerHTML =
      `${score} <span>/ ${TOTAL_ROUNDS}</span>`;

    const msgs = {
      0: "Better luck next time! Study up on Indian cars. 🚗",
      1: "Not bad! You know your cars a little. 👍",
      2: "Perfect score! You're a true Indian auto enthusiast! 🏆",
    };
    document.getElementById('score-msg').textContent = msgs[score] || msgs[0];

    const trophy = score === TOTAL_ROUNDS ? '🏆' : score > 0 ? '🎯' : '😅';
    document.getElementById('trophy-icon').textContent = trophy;

    const list = document.getElementById('review-list');
    list.innerHTML = answered
      .map(({ question, correct, selectedId }) => {
        const icon = correct ? '✅' : '❌';
        const selected = question.options.find((o) => o.id === selectedId);
        const detail = correct
          ? `Correct: ${question.car.name}`
          : `You picked: ${selected?.name} · Answer: ${question.car.name}`;
        return `
          <div class="review-item">
            <span class="ri">${icon}</span>
            <div>
              <div class="car-name">${question.car.name}</div>
              <div class="detail">${detail}</div>
            </div>
          </div>`;
      })
      .join('');

    show('screen-results');
  }

  // ── Restart ───────────────────────────────────────────────────────
  function restartGame() {
    show('screen-start');
  }
</script>
</body>
</html>
